body: |
  > I only JavaScript to calm my nerves.

  [Future Frontend](https://futurefrontend.com/) (27-28.5, Espoo, Finland) is getting closer as it occurs at the end of the month. There are still some tickets left and I'm sure we'll fill our space well. There's also sauna in store.

  ## Libraries

  * [danielroe/beasties: A library to inline your app's critical CSS and lazy-load the rest.](/library/beasties)
  * [Anime.js 4.0 - JavaScript Animation Engine](https://animejs.com/)

  ## Frameworks

  * [GSAP web animation framework is now free](https://gsap.com/blog/3-13/)
  * [Next.js 15.3 with Turbopack for builds](https://nextjs.org/blog/next-15-3)
  * [nordcraft - the open-source visual frontend framework](/library/nordcraft)
  * [mastra: The TypeScript AI agent framework. ⚡ Assistants, RAG, observability. Supports any LLM: GPT-4, Claude, Gemini, Llama.](/library/mastra)

