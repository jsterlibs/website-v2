body: |
  > It's not just a signal, it's JavaScript

  There are no words for what's happening in Ukraine right now. I can only hope the situation finds a peaceful resolution as soon as possible. That said, here's a monthly list of JavaScript links to study.

  ## Libraries

  * [Braid](/library/braid) - Synchronization for HTTP
  * [cosinekitty/astronomy](/library/astronomy) - Astronomy Engine: multi-language calculation of Sun, Moon, and planet positions. Predicts lunar phases, eclipses, transits, oppositions, conjunctions, equinoxes, solstices, rise/set times, and other events. Provides vector and angular coordinate transforms among equatorial, ecliptic, and horizontal orientations.
  * [fdaciuk/conduit-api](/library/conduit-api) - API for Real World App project (Conduit) using Node.js + TS with Functional Programming
  * [matthewp/haunted](/library/haunted) - React's Hooks API implemented for web components
  * [classname-variants](/library/classname-variants) - Stitches-like variant API for plain class names
  * [googlemaps-react-primitives](/library/googlemaps-react-primitives) - Google Maps primitives for React
  * [react-api-query](/library/react-api-query) - Hooks to use react-query with a typed API client
  * [Rythm.js](/library/rythm-js) - A JavaScript library that makes your page dance
  * [terotests/numbot](/library/numbot) - A configurable parser for text based logs

  ## Frameworks

  * [raimohanska/harmaja](/library/harmaja) - Experimental frontend framework
  * [BuilderIO/qwik](/library/qwik) - The HTML-first framework. Initialize apps of any size with < 1kb JS
  * [pankod/refine](/library/refine) - refine is a React-based headless framework for building data-intensive applications in no time ✨ It ships with Ant Design System, an enterprise-level UI toolkit.

  ## TypeScript

  * [Filtering undefined elements from an array in TypeScript](https://www.benmvp.com/blog/filtering-undefined-elements-from-array-typescript/)

  ## Security

  * [Simek/yarn-lock-changes](https://github.com/Simek/yarn-lock-changes) - Creates a comment inside Pull Request with the human-readable summary of changes to the Yarn lock file
  * [Injecting backdoors to NPM packages](https://dev.to/kozlovzxc/injecting-backdoors-to-npm-packages-a0k)
  * [Enarx](https://enarx.dev/) - WebAssembly + Confidential Computing

  ## CSS

  * [Don't try this at home: CSS _as_ the backend - introducing Cascading Server Sheets!](https://dev.to/thormeier/dont-try-this-at-home-css-as-the-backend-what-3oih)

