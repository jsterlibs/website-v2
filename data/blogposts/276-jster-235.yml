body: |
  > Why is the JavaScript gone?

  I have managed to acquire most of the topics for [Future Frontend 2025 (27-28.5)](https://futurefrontend.com/). It has been interesting to observe how AI affects the conference program as it is difficult to ignore its impact.

  ## Frameworks

  * [hypermodeinc/modus: Modus: an open source, serverless framework for building intelligent functions and APIs, powered by WebAssembly](/library/modus)
  * [JavaScript Frameworks - Heading into 2025](https://dev.to/playfulprogramming/javascript-frameworks-heading-into-2025-hkb)

  ## Libraries

  * [potree - WebGL point cloud viewer for large datasets](/library/potree)
  * [Radashi - TypeScript utility library](https://radashi.js.org/)
  * [Vega - Visualization grammars](https://vega.github.io/)

  ## Tools

  * [drawdb-io/drawdb: Free, simple, and intuitive online database diagram editor and SQL generator.](/library/drawdb)
  * [sonda - Universal visualizer and analyzer for JavaScript and CSS bundles](/library/sonda)
  * [Grasp - Search, replace, and refactor your JavaScript code based on its structure rather than its text](https://www.graspjs.com/)

  ## Articles

  * [The Performance Inequality Gap, 2024](https://infrequently.org/2024/01/performance-inequality-gap-2024/)

  ## Papers

  * [Survey of Edge Databases for the Web](https://www.researchgate.net/publication/388001154_Survey_of_Edge_Databases_for_the_Web)
  * [Comparison of web performance optimization techniques -1990s vs. 2020s](https://www.researchgate.net/publication/387485302_Comparison_of_web_performance_optimization_techniques_-1990s_vs_2020s)
