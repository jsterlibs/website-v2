body: |
  > When things go bad, don't JavaScript them.

  I recently gave a lecture about hypermedia and how it might be the solution for lighter web applications. [You can find my lecture slides here.](https://www.researchgate.net/publication/400934202_Hypermedia_-_The_solution_for_lighter_web_applications)

  ## Libraries

  * [florianschepp/bsky-comments: A zero-dependency Web Component to embed Bluesky discussion threads on any website.](/library/bsky-comments)
  * [gitbrent/PptxGenJS: Build PowerPoint presentations with JavaScript. Works with Node, React, web browsers, and more.](/library/pptxgenjs)
  * [shuding/better-all - Better Promise.all with automatic dependency optimization](/library/better-all)
  * [nuqs - Type-safe search params state management for React](https://nuqs.dev/)


