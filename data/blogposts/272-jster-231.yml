body: |
  > JavaScript. It lives forever. Right there in your heart.

  I just finished a busy week at [Web Summit](https://websummit.com/) and I still have a writeup to do. Interestingly enough the event doesn't have much to do with the web although it started from those origins.

  ## Libraries

  * [Plaiceholder - Beautiful image placeholders without the hassle](https://plaiceholder.co/docs)
  * [brimdata/react-arborist: The complete tree view component for React](/library/react-arborist)
  * [ChrisShank/perfect-arrow: A custom element to declaratively define perfect arrows.](/library/quiver)
  * [mastodon-post Web Component](https://darn.es/mastodon-post-web-component/)
  * [Legend State - Performant state manager for React](https://legendapp.com/open-source/state/intro/introduction/)

  ## Frameworks

  * [Tailus UI - an alternative to shadcn](https://tailus.io/)

  ## Platforms

  * [evoluhq/evolu: Local-first platform designed for privacy, ease of use, and no vendor lock-in](https://github.com/evoluhq/evolu)

  ## SDKs

  * [AgentQL for fullstack developers: announcing our JavaScript SDK](https://www.agentql.com/blog/javascript-sdk)

