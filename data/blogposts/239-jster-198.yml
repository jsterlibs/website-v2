title: "JSter #198: Libraries and more"
short_title: "JSter #198"
user: bebraw
slug: jster-198
body: |
  > The only thing we have to fear is JavaScript itself.

  I recently gave a presentation titled [ECMAScript - From an idea to a major standard](https://www.slideshare.net/bebraw/ecmascript-from-an-idea-to-a-major-standard) ([paper](https://arxiv.org/abs/2305.01373)) at EURAS 2023. That's also the reason why this edition was delayed by a couple of days.

  ## Libraries

  * [DrizzleORM - next gen TypeScript ORM](https://orm.drizzle.team/)
  * [Splide is a lightweight, flexible and accessible slider/carousel written in TypeScript. No dependencies, no Lighthouse errors](https://splidejs.com/)
  * [GoogleChromeLabs/quicklink: Faster subsequent page-loads by prefetching in-viewport links during idle time](/library/quicklink)
  * [superlucky84/lithent - A lightweight Virtual DOM UI library](/library/lithent)

  ## Frameworks

  * [Qwik 1.2: Performance in Autopilot](https://www.builder.io/blog/qwik-1-2-performance-autopilot)
  * [Enhance - Full stack HTML first framework](https://enhance.dev/)
  * [Medusa - Building blocks for digital commerce](https://medusajs.com/)
  * [NestJS v10 is now available](https://trilon.io/blog/nestjs-10-is-now-available)
  * [waiter-and-autratac/WaiterAndAUTRATAC: A pair of frameworks that allow delaying JavaScript code execution.](/library/waiterandautratac)
  * [Fresh 1.2 - sharing state between islands, limited npm support, and more](https://deno.com/blog/fresh-1.2)

  ## Services

  * [Modern Font Stacks](https://modernfontstacks.com/) - Font stacks to choose from

  ## Tools

  * [WebReflection/basic-devtools: Exports `$`, `$$`, and `$x` utilities as described in Chrome Console Utilities API reference](/library/basic-devtools)
  * [Browsh - The modern text based browser](https://www.brow.sh/)
  * [Fallback Font Generator](https://screenspan.net/fallback)

  ## CSS

  * [kkuchta/css-only-chat: A truly monstrous async web chat using no JS whatsoever on the frontend](https://github.com/kkuchta/css-only-chat)
  * [Panda CSS - The fastest way to build beautiful websites in React.](https://panda-css.com/)

  ## Articles

  * [A better way to use Dotenv](https://blog.coderspirit.xyz/blog/2023/06/25/a-better-way-to-use-dotenv/)
  * [The problem with disabled buttons and what to do instead](https://adamsilver.io/blog/the-problem-with-disabled-buttons-and-what-to-do-instead/)
  * [Misko's Take on a Unified Theory of Reactivity](https://www.builder.io/blog/unified-reactivity-theory)
  * [JavaScript Imports Under The Hood](https://blog.jim-nielsen.com/2023/imports-under-the-hood/)
