body: |
  > JavaScript - still running strong.

  It's time for the 160th JSter post. I updated [my webpack book to support webpack 5](https://survivejs.com/blog/webpack-book-updated-to-webpack-5/) recently.

  The [next React Finland mini-conference takes place 28th of October](https://react-finland.fi/blog/online-mini-conf-vol-4/) and it's going to be about lessons learned.

  ## Libraries

  * [eldh/credt](/library/credt) - CRDT-like data structures for building distributed, offline-first applications
  * [Functional](/library/functional) - Common Functional Programming Algebraic data types for JavaScript that is compatible with most modern browsers and Deno.
  * [scurker/currency.js](/library/currency-js) - JavaScript library for handling currencies
  * [techfort/LokiJS](/library/lokijs) - JavaScript embeddable / in-memory database
  * [Magenta](/library/magenta) - Make music and art using machine learning
  * [duetds/date-picker](/library/date-picker-2) - Accessible date picker
  * [hazae41/mutevents](/library/mutevents) - Typed, async, and promiseable events for Deno
  * [Moment.js](/library/moment-js) - Moment is considered legacy, please move on
  * [Eta](/library/eta) - Lightweight, powerful, pluggable embedded JS template engine.
  * [lukeed/watchlist](/library/watchlist) - Recursively watch a list of directories & run a command on any file system changes
  * [Screensaver.js](/library/screensaver) - Starts a screensaver after timeout milliseconds of inactivity on your site

  ## Frameworks

  * [Oruga](/library/oruga) - Oruga UI is like a caterpillar, minimal and yet functional. It's in your hands turning it into a butterfly
  * [chriskalmar/shyft](/library/shyft) - Shyft is a server-side framework for building powerful GraphQL APIs

  ## React

  * [luispuig/react-snaplist-carousel](https://github.com/luispuig/react-snaplist-carousel) - Snaplist with React
  * [Introducing React Spectrum](https://react-spectrum.adobe.com/blog/introducing-react-spectrum.html)
  * [airbnb/visx](https://github.com/airbnb/visx) - Visualization components
  * [vadimdemedes/ink](https://github.com/vadimdemedes/ink) - React for interactive command-line apps
  * [pmndrs/jotai](https://github.com/pmndrs/jotai) - Primitive, flexible state management for React

  ## Tools

  * [Benchmark.js](https://benchmarkjs.com/) - A benchmarking library that supports high-resolution timers & returns statistically significant results.
  * [malinajs](/library/malinajs) - Frontend compiler, inspired by Svelte
  * [Svelte <3 TypeScript](https://svelte.dev/blog/svelte-and-typescript) - Svelte has a first-class support for TypeScript now
  * [Rush](https://rushjs.io/) - A scalable monorepo manager for the web
  * [mfrachet/cypress-audit](/library/cypress-audit) - Run Lighthouse and Pa11y audits directly in your E2E test suites
  * [postcss/releases/tag/8.0.0](/library/postcss) - PostCSS has reached 8.0.0
  * [Deno 1.4](/library/deno) - Alternative to Node by Ryan Dahl
  * [Nx: Extensible Dev Tools for Monorepos](https://nx.dev/react/)
  * [Component Story Format](/library/csf) - An open standard for UI component examples based on JavaScript ES6 modules.

  ## Articles

  * [State management in Visly](https://visly.app/blog/state-management-in-visly)
  * [Detached window memory leaks](https://web.dev/detached-window-memory-leaks/)
  * [How to learn effectively as a developer](https://survivejs.com/blog/how-to-learn-effectively-as-a-developer/)

