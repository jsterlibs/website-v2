  > No tricks, only JavaScript

  Lately I've been refactoring my site creator, [Gustwind](https://gustwind.js.org/). Now it accepts HTML syntax and it's shaping up nicely although there's work left to be done.

  ## Libraries

  * [jessquery - A modern, light (3k) alternative to jQuery](/library/jessquery)
  * [data-guardian - a collection of security related utilities for TypeScript](/library/data-guardian)
  * [Color.js - let's get serious about color.](/library/color-js)
  * [blitz-js/superjson: Safely serialize JavaScript expressions to a superset of JSON, which includes Dates, BigInts, and more.](/library/superjson)
  * [React Knob Headless](/library/react-knob-headless)

