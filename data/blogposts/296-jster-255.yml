body: |
  > Summer is the best day of the year.

  It's only about a month to this year's [Future Frontend](https://futurefrontend.com/) conference. I was also able to set up a seminar titled [AI meets SDLC](https://www.sdlcai.org/) for 13.10 at Aalto University. In addition I made my [scientific writing book](https://learnscientificwriting.com/) available to the public through the web. I've also been developing [a new experimental tool for slide authoring](https://slideotter.com/).

