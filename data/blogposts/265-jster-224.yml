  > Round up the usual JavaScripts!

  We produced [a mood video of Future Frontend 2024](https://www.youtube.com/watch?v=UNWLX6QI3ow) in case you want to see what happened at the recent event.

  ## Techniques

  * [Garbage collection and closures](https://jakearchibald.com/2024/garbage-collection-and-closures/)
  * [Styling Tables the Modern CSS Way](https://piccalil.li/blog/styling-tables-the-modern-css-way/)
  * [Handling Time Zone in JavaScript](https://toastui.medium.com/handling-time-zone-in-javascript-547e67aa842d)

  ## Libraries

  * [MapLibre - performant open source mapping library](https://maplibre.org/)
  * [lxsmnsyc/seroval: Stringify JS values](/library/seroval)
  * [@lazarv/react-server - The easiest way to build React apps with server-side rendering](https://react-server.dev/)
  * [mjackson/fetch-super-headers: A drop-in replacement for JavaScript `Headers` with type-safe access](/library/remix-the-web)
  * [neg4n/d3-no-dom: 📊 Fully use D3.js (Data Driven Documents) in environments without DOM. Perfect for serverless e.g. Vercel Functions](/library/d3-no-dom)

