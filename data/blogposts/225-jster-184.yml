title: "JSter #184: Libraries and more"
short_title: "JSter #184"
user: bebraw
slug: jster-184
body: |
  > Mama always said life was like a box of JavaScript libraries

  A lot of libraries this time. That's all.

  I also wrote documentation for my JSON based templating solution called [Breezewind](https://gustwind.js.org/breezewind/). It's the core of jster.net and you can think it as a React inspired way to handle templates.

  ## Libraries

  * [bmoren/p5.collide2D](/library/p5-collide2d) - A collision detection library for 2D geometry in p5.js
  * [FullCalendar](/library/fullcalendar) - The Most Popular JavaScript Calendar
  * [developit/snarkdown](/library/snarkdown) - A snarky 1kb Markdown parser written in JavaScript
  * [natemoo-re/ultrahtml](/library/ultrahtml) - A 1.75kB library for enhancing HTML
  * [ANTLR (ANother Tool for Language Recognition)](/library/antlr4) - A powerful parser generator for reading, processing, executing, or translating structured text or binary files
  * [Pinia](/library/pinia) - The Vue Store that you will enjoy using
  * [JLCarveth/zjs](/library/zjs) - Yet Another JavaScript Runtime
  * [validator.js](/library/validator-js) - String validation
  * [LyraSearch/lyra](/library/lyra) - Fast, in-memory, typo-tolerant, full-text search engine written in TypeScript
  * [natemoo-re/ultrafetch](/library/ultrafetch) - RFC-7234 compliant caching for any `fetch` implementation
  * [lxsmnsyc/waystone](/library/waystone) - MPAs that feels like SPAs
  * [Million.js](/library/million-js) - Virtual DOM into the future
  * [Promise pool](/library/promise-pool)
  * [ferdikoomen/openapi-typescript-codegen](/library/openapi-typescript-codegen) - NodeJS library that generates TypeScript or JavaScript clients based on the OpenAPI specification

  ## React

  * [jed/wc-jsx-runtime](https://github.com/jed/wc-jsx-runtime) - A JSX transform for Web Components
  * [react-curved-input](https://akx.github.io/react-curved-input/)
  * [Shopify/react-native-skia](https://github.com/Shopify/react-native-skia) - High-performance React Native Graphics using Skia
  * [dai-shi/react-hooks-global-state](https://github.com/dai-shi/react-hooks-global-state) - Simple global state for React with Hooks API without Context API

  ## Frameworks

  * [Tauri](/library/tauri) - Build smaller, faster, and more secure desktop applications with a web frontend

