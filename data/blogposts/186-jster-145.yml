body: |
  > There's no place like JavaScript

  It has been a busy month. I had to skip the previous edition of JSter as I was [busy with CSSCamp and JSCamp in Barcelona](https://survivejs.com/blog/csscamp-jscamp-2019/). Now I'm back in action.

  ## Libraries

  * [ungap](/library/ungap) - Pragmatic polyfills
  * [Fastify v2 is coming to town](/library/fastify-v2-is-coming-to-town)
  * [interact.js](/library/interact-js) - JavaScript drag and drop, resizing, and multi-touch gestures for modern browsers (and also IE9+)
  * [Newton Graph Library](/library/newton-graph-library) - High-level dashboard visualization for architects and stakeholders
  * [lukeed/classico](/library/classico) - A tiny (255B) shim when Element.classList cannot be used~!
  * [TypeScript + Machine Learning + simplicity = Kalimdor.js](/library/typescript-machine-learning-simplicity-kalimdor-js)
  * [Splitting.js](/library/splitting-js) - CSS Vars for split words & chars! (items, grids, images, too!)
  * [ScrollOut](/library/scrollout) - ScrollOut detects changes in scroll for reveal, parallax, and CSS Variable effects!
  * [sadick254/scoped-style](/library/scoped-style) - A tiny css-in-js library

  ## Frameworks

  * [jaredpalmer/after.js](/library/after-js) - Next.js-like framework for server-rendered React apps built with React Router 4
  * [GoogleChromeLabs/carlo](/library/carlo) - Web rendering surface for Node applications

  ## Techniques

  * [Add GUI to your E2E API tests](https://www.cypress.io/blog/2017/11/07/add-gui-to-your-e2e-api-tests/)

