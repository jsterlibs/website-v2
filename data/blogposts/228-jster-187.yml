  > XmasScript needs to become a thing

  Xmas is getting close and this is the last JSter post of the year.

  ## Libraries

  * [Jeongho made 1,000x faster TypeScript Validator Library](/library/jeongho-made-1-000x-faster-typescript-validator-library)
  * [arackaf/micro-graphql-svelte](/library/micro-graphql-svelte) - Light and simple GraphQL Svelte client with extensible, composable cache invalidation
  * [Tremor](/library/tremor) - The React library to build dashboards fast
  * [Legend](/library/legend) - A super fast and powerful state library for JavaScript apps
  * [hazae41/xswr](/library/xswr) - Yet another React data (re)fetching library
  * [Telefunc](/library/telefunc) - Remote Functions. Instead of API.
  * [bigskysoftware/idiomorph](/library/idiomorph) - A DOM-merging algorithm
  * [WebReflection/uhtml](/library/uhtml) - A micro HTML/SVG render
  * [Modular Forms](/library/modular-forms) - The modular form library for SolidJS

