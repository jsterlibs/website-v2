body: |
  > Happy new year JavaScripters!

  New year, new challenges. I have a small favor to ask you. I have a MSc student researching how AI is used for web development. To help out, [fill his query](https://link.webropolsurveys.com/S/912CFE17C68C17B6) (5-15 mins).

  ## Libraries

  * [Recharts - A composable charting library built on React components](/library/recharts)
  * [Victory - React.js components for modular charting and data visualization](/library/victory)
  * [capricorn86/happy-dom: A JavaScript implementation of a web browser without its graphical user interface](/library/happy-dom)
  * [react-R/reactR: React for R](/library/reactr)
  * [pg-nano: Type-safe calls to Postgres UDFs, rapid SQL-first schema development, libpq-based client library](/library/pg-nano)
  * [nodejs/amaro: Node.js TypeScript wrapper](/library/amaro)
  * [WebReflection/promise: Abortable and Resolvable Promises.](/library/promise)
  * [errsole/errsole.js: Node.js logger with a built-in dashboard](/library/errsole-js)
  * [ReactRx - Hooks for combining React with Rx observables](/library/reactrx)
  * [matcha.css - Drop-in semantic styling library in pure CSS](/library/matcha-css)
  * [Base UI - Unstyled UI components for building accessible web apps and design systems](/library/base-ui)

  ## Frameworks

  * [ruvnet/drupaljs - Drupal ported to JavaScript](/library/drupaljs)
  * [AdonisJS - A fully featured web framework for Node.js](/library/adonisjs)

  ## Articles

  * [The unique position of Vite in our ecosystem](https://silvenon.com/blog/vite-and-frameworks)
  * [A Guide To Accessible Form Validation](https://www.smashingmagazine.com/2023/02/guide-accessible-form-validation/)
  * [A nice overview on how closures can bite you in React and cause memory leaks.](https://www.schiener.io/2024-03-03/react-closures)

