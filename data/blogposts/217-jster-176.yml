body: |
  > 2022 - Only twos and zeros

  Welcome to 2022. Let's hope it's better than 2021.

  ## Libraries

  * [mnater/Hyphenopoly](/library/hyphenopoly) - Hyphenation for node and Polyfill for client-side hyphenation
  * [Malina.js](/library/malina-js) - Performant Svelte-style evaluator
  * [Svelte Intl Precompile](/library/svelte-intl-precompile) - The i18n library for Svelte that analyzes and compiles your translations at build time
  * [devongovett/tree-sitter-highlight](/library/tree-sitter-highlight) - A syntax highlighter for Node powered by Tree Sitter. Written in Rust.
  * [Theatre.js](/library/theatre-js) - Theatre.js is a JavaScript animation library with a GUI. It animates the DOM, WebGL, and any other JavaScript variable.
  * [Matsuuu/vanilla-rough-notation](/library/vanilla-rough-notation) - A Vanilla JS Web Component implementation of the Rough Notation library
  * [Rough.js](/library/rough-js) - Create graphics with a hand-drawn, sketchy, appearance
  * [Open UI](/library/open-ui) - The missing industry standard definition of UI
  * [anttiviljami/human-filetypes](/library/human-filetypes) - Human-friendly categorisation of file types based on extension or MIME type
  * [exhibitionist-digital/ultra](/library/ultra) - Deno + React: No build, no bundle, all streaming
  * [MapLibre](/library/maplibre) - Open-source mapping libraries for developers of web and mobile applications.
  * [Introducing Sandpack](/library/sandpack) - The core of CodeSandbox is open source now
  * [Floating UI](/library/floating-ui) - Powerful positioning primitives
  * [Open Props: sub-atomic styles](/library/open-props) - Supercharged CSS variables

  ## Articles

  * [How Valtio Proxy State Works (React Part)](https://blog.axlight.com/posts/how-valtio-proxy-state-works-react-part/)
  * [Performant A/B Testing with Cloudflare Workers](https://philipwalton.com/articles/performant-a-b-testing-with-cloudflare-workers/)
  * [Highlights of the Web Almanac 2021](https://www.stefanjudis.com/blog/highlights-from-the-web-almanac-2021/)
  * [The 2021 Web Almanac](https://almanac.httparchive.org/en/2021/)

  ## Tools

  * [Vitest](https://vitest.dev/) - A blazing fast unit-test framework powered by Vite
  * [facebook/create-react-app/releases/tag/v5.0.0](/library/create-react-app) - CRA v5.0
