body: |
  > If we can't see the JavaScript in each other, we've already lost the fight.

  Maybe I mentioned it already but [remember to preregister for next year's Future Frontend conference](https://futurefrontend.com/) that takes place 8-9.6.26 at Espoo, Finland.

