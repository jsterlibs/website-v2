  > What we do in JavaScript echoes in eternity

  Another two weeks, another bunch of links to check.

  ## Libraries

  * [joshmarinacci/node-pureimage - Pure JS implementation of the HTML Canvas 2D drawing API](/library/node-pureimage)
  * [kolodny/immutability-helper - Mutate a copy of data without changing the original source](/library/immutability-helper)
  * [TanStack/bling - Framework agnostic transpilation utilities for client/server RPCs, env isolation, islands, module splitting, and more.](/library/bling)
  * [Effect-TS/schema - Modeling the schema of data structures as first-class values](/library/schema)

