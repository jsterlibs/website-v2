body: |
  > What are you prepared to JavaScript?

  I recently completed the rewrite of [survivejs.com](https://survivejs.com/) although I still have to write a blog post describing the technical bits behind it as quite a lot of development effort went into the site. As [Future Frontend](https://futurefrontend.com/) (13-14.6, Helsinki) conference takes place in a month, that has been keeping me busy.

  ## Frameworks

  * [Gracile - A thin, full-stack, web framework](/library/gracile)
  * [hex2f/marz: 🚀 A Fast and Lightweight React Server Components Framework for Bun](/library/marz)
  * [VanJS: A 1.0kB Grab 'n Go Reactive UI Framework without React/JSX](/library/vanjs)
  * [DML - Object oriented web programming framework](/library/dml)
  * [Supercharge — an open-source Node.js framework, not just a web framework](/library/supercharge)

  ## Libraries

  * [lxsmnsyc/seroval: Stringify JS values](/library/seroval)

