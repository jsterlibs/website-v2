  > This is JavaScript!

  I've working on a new revision of [SurviveJS website](https://survivejs.com/) based on [Gustwind](https://gustwind.js.org/). This type of work is good in testing framework ideas and fixing oversights in the original design and I think the end result will be worth the effort.

  ## Libraries

  * [xstate/store Simple event-based state management](/library/xstate-2)
  * [aralroca/diff-dom-streaming - HTML Streaming Over the Wire! 🥳 Diff DOM algorithm with streaming to make only the necessary modifications, insertions and deletions between a DOM node and an HTML stream reader](/library/diff-dom-streaming)
  * [openapi-zod-client - From openapi to Zod types](/library/openapi-zod-client)
  * [Reasonable Colors](/library/reasonable-colors)
  * [Superstate - Typesafe statecharts library](/library/superstate)

  ## Techniques

  * [How JSR was built](https://deno.com/blog/how-we-built-jsr)

