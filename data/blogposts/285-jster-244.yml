body: |
  > There can be only one JavaScript

  [Future Frontend conference](https://futurefrontend.com/) ran last week and from my perspective it was a success in many ways. I also [completed my doctoral defense successfully](https://survivejs.com/research/).

  Since there's somehow less action in the JavaScript space (or I notice less of it), I'll move to a monthly schedule with the mailing list for now. This may also be a sign of stability or shift of focus to AI/LLM.

  ## Libraries

  * [bholmesdev/simple-rsc: A simple React Server Components implementation that you can build yourself 🙌](/library/simple-rsc)
  * [React Virtuoso - Virtualization with React](https://virtuoso.dev/)
  * [luwes/little-vdom: 🍼 650B Virtual DOM - Use reactive JSX with minimal overhead](/library/little-vdom)
  * [Next-Yak - Zero-runtime CSS-in-JS for Next.js powered by Rust](https://yak.js.org/)
  * [ValueMelody/melody-auth: A turnkey OAuth & authentication system, designed for both Cloudflare Workers and Node.js](/library/melody-auth)
  * [Slidev - Presentation slides for developers](https://sli.dev/)
  * [tscircuit - Code Electronics with React](https://tscircuit.com/)

  ## Techniques

  * [Handling routes in JavaScript projects](https://www.seancdavis.com/posts/handling-routes-in-javascript-projects/)
  * [Progressive JSON](https://overreacted.io/progressive-json/)
  * [Types as axioms, or: playing god with static types](https://lexi-lambda.github.io/blog/2020/08/13/types-as-axioms-or-playing-god-with-static-types/)
  * [Collaborative Text Editing without CRDTs or OT](https://mattweidner.com/2025/05/21/text-without-crdts.html)
  * [Polishing your typography with line height units](https://webkit.org/blog/16831/line-height-units/)
  * [Untangling the LLM spaghetti with ElectricSQL](https://electric.ax/blog/2025/04/22/untangling-llm-spaghetti)

