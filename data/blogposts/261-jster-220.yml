body: |
  > It's supposed to be JavaScript.

  [Future Frontend 2024](https://futurefrontend.com/) conference is getting close (13-14.6). We'll produce a live stream and it will be announced through our [X account](https://x.com/future_frontend) in a week or so.

  ## Tools

  * [yoavbls/pretty-ts-errors: 🔵 Make TypeScript errors prettier and human-readable in VSCode 🎀](/library/pretty-ts-errors)
  * [yanthomasdev/lunaria: The missing localization management toolchain for open-source projects](/library/lunaria)
  * [Rustify your JavaScript tooling](https://dev.to/thepassle/rustify-your-javascript-tooling-2doj)
  * [recheck - The trustworthy ReDoS checker](https://makenowjust-labs.github.io/recheck/)
  * [npmgraph - Render dependency graph of a package](https://npmgraph.js.org/)

  ## Techniques

  * [Practical barrel file guide for library authors](https://thepassle.netlify.app/blog/practical-barrel-file-guide-for-library-authors)
