body: |
  > You know, you don't JavaScript much, do you?

  It's less than two months to [Future Frontend](https://futurefrontend.com/) (27-28.5, Espoo, Finland). I also have my [doctoral defense](https://www.aalto.fi/fi/tapahtumat/vaitos-tietotekniikan-alalta-msc-juho-vepsalainen) at 30.5 so it will be a busy week for certain someone.

  ## Libraries

  * [Announcing TanStack Form v1](/library/tanstack-form)
  * [Tempo - The easiest way to work with Dates in JavaScript](/library/tempo)
  * [React Bits - Animated UI Components For React](/library/react-bits)
  * [quansync-dev/quansync: "Superposition" between sync and async](/library/quansync)
  * [unjs/unstorage: 💾 Unstorage provides an async Key-Value storage API with conventional features like multi driver mounting, watching and working with metadata, dozens of built-in drivers and a tiny core.](/library/unstorage)

