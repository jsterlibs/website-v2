body: |
  > What took you so JavaScript?

  Given there's a lot of hype around AI, I took the bait and [interviewed Janos Dobronszki](https://survivejs.com/blog/singulatron-interview/) over at SurviveJS blog. Janos developed a tool called Singulatron that lets you run open source models easily on your own machine giving benefits, like having completely control over how your data is used.

  ## Libraries

  * [Announcing TypedSQL: Make your raw SQL queries type-safe with Prisma ORM](https://www.prisma.io/blog/announcing-typedsql-make-your-raw-sql-queries-type-safe-with-prisma-orm)
  * [bramus/style-observer: MutationObserver for CSS. Get notified when the computed value of a CSS property changes.](/library/style-observer)
  * [WebSID - Commodore 64 synthesizer](https://www.igorski.nl/apps/websid)
  * [PgTyped - Typesafe SQL in Typescript](https://pgtyped.dev/)
  * [Radashi - A collection of TypeScript utilities](https://radashi.js.org/)
  * [Instant - the realtime client-side database](/library/instant)
  * [Paraglide - Simple i18n for applications](https://paraglidejs.com/)
  * [Elementary Audio - A JavaScript library for digital audio signal processing](https://www.elementary.audio/)
  * [kucherenko/jscpd: Copy/paste detector for programming source code.](/library/jscpd)

