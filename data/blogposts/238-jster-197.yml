body: |
  > Elementary, my dear JavaScript.

  [The first edition of Future Frontend conference](https://futurefrontend.com/2023/) finished last week and I consider it a success. We are currently in post-production mode to get the conference content online.

  ## Libraries

  * [natemoo-re/ultramatter: <1KB frontmatter parser that supports a reasonable subset of YAML](/library/ultramatter)
  * [WebReflection/not-so-weak: Iterable WeakMap and WeakSet](/library/not-so-weak)
  * [Tiptap - Headless WYSIWYG Text Editor](/library/tiptap)

  ## Frameworks

