body: |
  > All JavaScript is good JavaScript.

  I'm close to done with my [SurviveJS](https://survivejs.com) rework. The new site will have more content while being much lighter and faster to compile so that's all good.

  ## Libraries

  * [TypeSpec - Describe your APIs concisely and more](https://typespec.io/)
  * [React 19 Beta](https://react.dev/blog/2024/12/05/react-19)
  * [json-editor - JSON Schema Based Editor](/library/json-editor)
  * [rjsf-team/react-jsonschema-form: A React component for building Web forms from JSON Schema.](/library/react-jsonschema-form)
  * [Introducing Declarative Routing for NextJS and React-Router](https://javascript.plainenglish.io/introducing-declarative-routing-for-nextjs-and-react-router-dbf34edc7542)
  * [tatethurston/nextjs-routes: Type safe routing for Next.js](/library/nextjs-routes)
  * [Loro – Reimagine state management with CRDTs](https://www.loro.dev/)

