body: |
  > I will honor JavaScript in my heart, and try to keep it all the year

  xmas is getting close and it's 2024 soon. That means we're way closer to 2050 than 1980. Time flies.

  ## Libraries

  * [Frappe Charts: Simple and Modern SVG Charts](https://frappe.io/products)
  * [Melt UI - Open source UI components for Svelte](https://www.melt-ui.com/)
  * [facebook/stylex: StyleX is the styling system for ambitious user interfaces.](/library/stylex)
  * [WebReflection/proxy-pants: Secured and reliable Proxy based utilities for more or less common tasks.](/library/proxy-pants)

  ## Frameworks

  * [Fuse.js: The opinionated framework for creating typesafe data layers](/library/fuse)
  * [Fresh 1.6: Tailwind CSS plugin, simplified typings and more](https://deno.com/blog/fresh-1.6)

