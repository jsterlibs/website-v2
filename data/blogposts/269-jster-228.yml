body: |
  > You are the JavaScript one

  We've started selling tickets for next year's Future Frontend conference. It will take place 27-28.5 at Espoo, Finland (close to Helsinki) and we'll focus on the intersection of AI, web design and development. The super early bird tickets (199€) are available until the end of October and you can [learn more about Future Frontend 2025](https://futurefrontend.com/blog/ff25/) at the conference website.

  ## Libraries

  * [webpro/reveal-md: reveal.js on steroids! Get beautiful reveal.js presentations from any Markdown file](/library/reveal-md)
  * [Slidev - Presentation slides for developers](/library/slidev)
  * [Panda CSS - Build modern websites using build time and type-safe CSS-in-JS](/library/panda-css)
  * [decs/typeschema: 🛵 Universal adapter for TypeScript schema validation.](/library/typeschema)
  * [Fulldev UI - Astro component and block library, open-source](/library/fulldev-ui)
  * [Fastify v5 is Here!](/library/fastify)

