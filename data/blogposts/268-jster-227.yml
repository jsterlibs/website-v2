body: |
  > With JavaScript, there's always a thing that you don't see coming.

  I have just a couple of quick things to mention: 1. there's a [petition to free JavaScript from its trademark](https://javascript.tm/) to allow free usage of the term 2. [today's Future Frontend meetup (18:00-21:00) where we built a techno will be livestreamed](https://www.youtube.com/live/7X-hnRPMths).

  ## Libraries

  * [dnd kit – a modern drag and drop toolkit for React](https://dndkit.com/)
  * [@pekkis/finnish-name-randomizer - Generate random Finnish names](/library/pekkis-finnish-name-randomizer)
  * [toad-scheduler - In-memory TypeScript scheduler](/library/toad-scheduler)
  * [TypeSpec - Describe APIs](https://typespec.io/)
  * [tinybench - A simple, tiny and lightweight benchmarking library!](/library/tinybench)
  * [electric-sql/pglite: Lightweight Postgres packaged as WASM into a TypeScript library for the browser, Node.js, Bun and Deno](/library/pglite)

