body: |
  > You don't know what JavaScript is. It's a relationship.

  Here's a quick injection of JavaScript libraries and related injection. If you are within the region, we'll organize [the first Future Frontend meetup](https://meetabit.com/events/future-frontend-january-2024/) 31.1 at Helsinki.

  ## Libraries

  * [TypeSchema - Universal adapter for TypeScript schema validation](/library/typeschema)
  * [Faire/mjml-react: React component library to generate the HTML emails on the fly](/library/mjml-react)
  * [Wedges — Open-source UI components for React](/library/wedges)
  * [isographlabs/isograph: Build React apps powered by GraphQL data](/library/isograph)
  * [43081j/hanbi: A small javascript library for stubbing and spying on methods/functions](/library/hanbi)

