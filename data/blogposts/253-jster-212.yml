body: |
  > JavaScript does not come without a tax of effort.

  One of my MSc students is doing [a survey related to the adoption of JavaScript frameworks](https://link.webropolsurveys.com/S/C8470021A862B4BE). It would be very helpful if you could fill in the form as that will help to generate useful insights.

  ## Libraries

  * [edmundhung/conform: A type-safe form validation library utilizing web fundamentals to progressively enhance HTML Forms with full support for server frameworks like Remix and Next.js.](/library/conform)
  * [tinypool - A minimal and tiny Node.js Worker Thread Pool implementation (38KB)](/library/tinypool)
  * [WebReflection/loop-once: A safer loop for sync or async unique use cases.](/library/loop-once)
  * [Faire/mjml-react: React component library to generate the HTML emails on the fly](/library/mjml-react)
  * [isographlabs/isograph: Build React apps powered by GraphQL data](/library/isograph)
  * [43081j/hanbi: A small javascript library for stubbing and spying on methods/functions](/library/hanbi)

  ## Frameworks

  * [ExpressoTS - Node.js Framework](/library/expressots)

