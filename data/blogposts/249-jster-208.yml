body: |
  > JavaScript is to my advantage.

  To gather leading minds of frontend space together, we'll organize [the second edition of Future Frontend](https://futurefrontend.com/blog/ff24/) 13-14.6.2024 at Helsinki, Finland. The conference has a single track organized a eight themed sessions. I expect our visitors will go back inspired and enjoy comfortably mild Finnish Summer.

  ## Libraries

  * [CSS Hooks - A new take on inline styles](https://css-hooks.com/)
  * [google/schema-dts: JSON-LD TypeScript types for Schema.org vocabulary](/library/schema-dts)
  * [varsace - Design tokens as TypeScript variables](/library/varsace)
  * [Effect - TS library to support creation of complex applications](https://effect.website/)
  * [Plyr - A simple, customizable HTML5 Video, Audio, YouTube and Vimeo player](https://plyr.io/)
  * [DavidWells/analytics: Lightweight analytics abstraction layer for tracking page views, custom events, & identifying visitors](/library/analytics)
  * [WebReflection/coincident: An Atomics based Proxy to simplify, and synchronize, Worker related tasks.](/library/coincident)
  * [Nuka Carousel 7 for React](https://nearform.com/open-source/nuka-carousel/)
  * [jagenjo/litegraph.js: A graph node engine and editor written in Javascript similar to PD or UDK Blueprints, comes with its own editor in HTML5 Canvas2D](/library/litegraph-js)

