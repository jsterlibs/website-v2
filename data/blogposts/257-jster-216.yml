body: |
  > Think big, think JavaScript, never show any sign of weakness

  Spring is literally around the corner in Finland. Just a month to go till the snow is mostly gone!

  ## Libraries

  * [WebReflection/qsa-observer: handle elements lifecycle through CSS selectors](/library/qsa-observer)
  * [fabiospampinato/flimsy: A single-file <1kb min+gzip simplified implementation of the reactive core of Solid, optimized for clean code.](/library/flimsy)
  * [nairihar/threadshare: Simplify inter-thread data sharing in Node.js worker_threads with ThreadShare.](/library/worker-map)
  * [atlassian/pragmatic-drag-and-drop: Fast drag and drop for any experience on any tech stack](/library/pragmatic-drag-and-drop)
  * [codepoint-iterator - A utility converting an iterable of UTF-8 filled Uint8Array's into Unicode code points](/library/codepoint-iterator)
  * [unadlib/mutative: Efficient immutable updates, 2-6x faster than naive handcrafted reducer, and more than 10x faster than Immer.](/library/mutative)
  * [path-unified - Isomorphic path utilities for browser and server](/library/path-unified)

