<!DOCTYPE html>
<html &lang="(get context meta.language)">
  <head>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🃏</text></svg>"
    />
    <link
      &visibleIf="(get context document.hasCodeBlocks)"
      __reference="https://web.dev/defer-non-critical-css/"
      rel="preload"
      href="https://cdn.jsdelivr.net/gh/highlightjs/highlight.js@11.9.0/src/styles/github-dark.min.css"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript
      &visibleIf="(get context document.hasCodeBlocks)"
      ><link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/highlightjs/highlight.js@11.9.0/src/styles/github-dark.min.css"
    /></noscript>
    <MetaFields />
  </head>
  <body>
    <MainNavigation />
    <main &children="(get props content)"></main>
    <MainFooter />
    <script>
      (() => {
        const contextProvider = navigator.modelContext;

        if (!contextProvider || typeof contextProvider.provideContext !== "function") {
          return;
        }

        contextProvider.provideContext({
          tools: [
            {
              name: "open_jster_catalog",
              description: "Open the JSter JavaScript library catalog.",
              inputSchema: {
                type: "object",
                properties: {},
                additionalProperties: false,
              },
              execute: async () => {
                const url = new URL("/catalog/", location.origin).toString();
                location.href = url;

                return { url };
              },
            },
            {
              name: "open_jster_category",
              description: "Open a JSter category page by category id.",
              inputSchema: {
                type: "object",
                properties: {
                  id: {
                    type: "string",
                    description: "Category id, for example application-frameworks.",
                  },
                },
                required: ["id"],
                additionalProperties: false,
              },
              execute: async ({ id }) => {
                const slug = String(id || "").trim();
                const url = new URL(`/category/${encodeURIComponent(slug)}/`, location.origin).toString();
                location.href = url;

                return { url };
              },
            },
          ],
        });
      })();
    </script>
    <Scripts />
  </body>
</html>
