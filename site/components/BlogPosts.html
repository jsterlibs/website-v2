<ol class="blog-index-list" &foreach="(get props blogPosts)">
  <li class="blog-index-item">
    <time
      class="blog-index-date"
      &datetime="(get props date)"
      &children="(formatDate (get props date))"
    ></time>
    <a
      class="blog-index-title"
      &children="(get props titleHtml)"
      &href="(get props url)"
    ></a>
  </li>
</ol>
