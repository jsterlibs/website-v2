<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta
  name="description"
  &content="(get context pageMeta.description (get context meta.description 'JSter catalogues JavaScript libraries per purpose'))"
/>
<meta
  name="robots"
  &visibleIf="(get context pageMeta.robots)"
  &content="(get context pageMeta.robots)"
/>
<meta property="built" &content="(get context meta.built)" />
<meta property="url" &content="(get context url)" />
<link rel="canonical" &href="(canonicalUrl (get context meta.url) (get context url))" />

<meta
  property="og:url"
  &content="(canonicalUrl (get context meta.url) (get context url))"
/>
<meta property="og:type" content="website" />
<meta property="og:site_name" &content="(get context meta.siteName)" />
<meta
  property="og:title"
  &content="(get context pageMeta.title (get context meta.title JSter))"
/>
<meta
  property="og:description"
  &content="(get context pageMeta.description (get context meta.description 'JSter catalogues JavaScript libraries per purpose'))"
/>
<meta
  property="og:image"
  &content="(urlJoin (get context meta.url) (trim (get context url) /) og.png)"
/>

<meta name="twitter:card" content="summary_large_image" />
<meta property="twitter:site" content="@jsterlibs" />
<meta
  property="twitter:title"
  &content="(get context pageMeta.title (get context meta.title JSter))"
/>
<meta
  property="twitter:description"
  &content="(get context pageMeta.description (get context meta.description 'JSter catalogues JavaScript libraries per purpose'))"
/>
<meta
  property="twitter:image"
  &content="(urlJoin (get context meta.url) (trim (get context url) /) og.png)"
/>

<title &children="(get context pageMeta.title (get context meta.title JSter))"></title>
