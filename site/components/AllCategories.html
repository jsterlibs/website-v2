<ul class="catalog-index" &foreach="(get props categories)">
  <li class="catalog-index-row">
    <h2
      &children="(get props title)"
      class="catalog-index-title"
    ></h2>
    <ul
      class="catalog-index-links"
      &foreach="(get props children)"
    >
      <li class="inline">
        <SiteLink
          &children="(get props title)"
          &href="(get props url)"
        ></SiteLink>
      </li>
    </ul>
  </li>
</ul>
